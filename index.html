<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="css/output.css">
</head>

<body>
    <main class="w-full h-screen bg-gray-900 flex justify-center items-center">
        <section class="w-[300px] mx-auto text-center bg-[#fffefe] py-[40px] rounded-lg">
            <input type="text" id="result" disabled
                class="w-[80%] h-16 text-4xl rounded-lg text-right mb-4 border border-gray-300">
            <button onclick="clearResult()" class="btn red">Ac</button>
            <button onclick="clearResult()" class="btn red">C</button>
            <button onclick="getResult('%')" class="btn orange">%</button>
            <button onclick="getResult('/')" class="btn orange">/</button>
            <button onclick="getResult('7')" class="btn">7</button>
            <button onclick="getResult('8')" class="btn">8</button>
            <button onclick="getResult('9')" class="btn">9</button>
            <button onclick="getResult('*')" class="btn orange">*</button>
            <button onclick="getResult('4')" class="btn">4</button>
            <button onclick="getResult('5')" class="btn">5</button>
            <button onclick="getResult('6')" class="btn">6</button>
            <button onclick="getResult('-')" class="btn orange">-</button>
            <button onclick="getResult('1')" class="btn">1</button>
            <button onclick="getResult('2')" class="btn">2</button>
            <button onclick="getResult('3')" class="btn">3</button>
            <button onclick="getResult('+')" class="btn orange">+</button>
            <button onclick="getResult('00')" class="btn">00</button>
            <button onclick="getResult('0')" class="btn">0</button>
            <button onclick="getResult('.')" class="btn">.</button>
            <button onclick="getResult('=')" class="btn orange">=</button>
        </section>
        
        <!-- info -->
        <div class="hidden w-[170px] h-[170px] rounded-full border-[1px] border-infoColor outline-[1px] outline-infoColor 
            outline-offset-8 fixed bottom-[50px] right-[40px] md:flex items-center justify-center select-none z-50 group">
            <div class="circle w-[165px] h-[165px] rounded-full">
                <img src="img/me5.webp" alt="" class="w-full h-full rounded-full object-cover">
            </div>
            <strong class="absolute top-[45%] right-[-88px] rotate-[90deg] text-[15px] italic text-infoColor">Frontend
                Developer</strong>
            <a href="https://www.linkedin.com/in/reza-geshani-web"><i
                    class="bi bi-linkedin group-hover:visible text-[26px] text-white absolute invisible transition-all duration-150 py-[10px] px-[30px] hover:opacity-100 hover:text-[#1f9caa] top-[-10px] left-[-58px]"></i></a>
            <a href="https://www.instagram.com/rezageshani_web"><i
                    class="bi bi-instagram group-hover:visible text-[26px] absolute invisible transition-all duration-150 py-[10px] px-[30px] hover:opacity-100 hover:text-[#1f9caa] text-white top-[40px] left-[-80px]"></i></a>
            <a href="https://github.com/RezaGeshaniWeb/"><i
                    class="bi bi-github group-hover:visible text-[26px] absolute invisible transition-all duration-150 py-[10px] px-[30px] hover:opacity-100 hover:text-[#1f9caa] text-white top-[90px] left-[-80px]"></i></a>
            <a href="mailto:rezageshaniweb@gmail.com"><i
                    class="bi bi-envelope-at group-hover:visible text-[26px] absolute invisible transition-all duration-150 py-[10px] px-[30px] hover:opacity-100 hover:text-[#1f9caa] text-white top-[130px] left-[-58px]"></i></a>
        </div>
    </main>

    <script src="js/script.js"></script>
</body>

</html>
